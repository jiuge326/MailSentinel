name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore (if exists)
        # 如需签名，在 GitHub Secrets 中配置 SIGNING_KEY / KEY_STORE_PASSWORD / KEY_PASSWORD / KEY_ALIAS
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ ! -z "$SIGNING_KEY" ]; then
            echo $SIGNING_KEY | base64 -d > app/keystore.jks
          fi

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*= "$.*$"/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | head -1 | sed 's/.*= $.*$/\1/')
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/MailSentinel-v${VERSION_NAME}-build${VERSION_CODE}.apk || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MailSentinel-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/MailSentinel-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
